name: Build & Publish Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write          # Release 생성/업로드 권한

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Build installer
        working-directory: electron
        run: npm run dist

      - name: Read app version
        id: ver
        shell: bash
        run: echo "v=$(node -p "require('./electron/package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: byU-PhotoBooth-Setup
          path: electron/dist/*.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.v }}
          name: byU 포토부스 v${{ steps.ver.outputs.v }}
          files: |
            electron/dist/*.exe
            electron/dist/latest.yml
